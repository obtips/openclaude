# Cloudflare Pages Functions 配置
# 部署到 Cloudflare Pages 时会自动读取此文件

# KV 命名空间绑定 (需要在 Cloudflare Dashboard 中创建)
[[kv_namespaces]]
binding = "SESSIONS"
id = "your_kv_namespace_id"  # 替换为实际的 KV Namespace ID
preview_id = "your_preview_kv_namespace_id"  # 可选: 预览环境使用

# 环境变量
[vars]
# GitHub OAuth 配置 (可在 Cloudflare Pages 设置中覆盖)
# GITHUB_CLIENT_ID = "your_github_client_id"
# GITHUB_CLIENT_SECRET = "your_github_client_secret"

# GitHub API 配置
# GITHUB_TOKEN = "your_github_token"
# GITHUB_REPO_OWNER = "your_repo_owner"
# GITHUB_REPO_NAME = "your_repo_name"

# 兼容性设置
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]
