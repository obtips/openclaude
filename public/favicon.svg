    <path d="M6 18 L4 22 L6 24 L10 22 Z" fill="white" opacity="0.7"/>
    <!-- 金属箍 -->
    <rect x="4" y="12" width="8" height="3" rx="0.5" fill="#C9A86C"/>
    <!-- 笔杆纹理 -->
    <path d="M7 7 L9 9" stroke="#C4956A" stroke-width="1" stroke-linecap="round" opacity="0.3"/>
    <path d="M9 7 L11 9" stroke="#C4956A" stroke-width="1" stroke-linecap="round" opacity="0.3"/>
    <!-- 高光 -->
    <path d="M8 8 L9 7" stroke="white" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
  </g>
</svg>
